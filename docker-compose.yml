services:
  app:
    build:
      context: .
      target: runtime
    image: subnet-calculator:latest
    container_name: subnet-calculator
    ports:
      - "8080:80"
    restart: unless-stopped

  # `docker compose --profile dev up` for hot-reload dev server on :5173
  dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: subnet-calculator-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173"]

  # `docker compose --profile test run --rm test` for one-shot vitest
  test:
    profiles: ["test"]
    build:
      context: .
      target: deps
    container_name: subnet-calculator-test
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "test"]
